[alembic]
# Path to migration scripts
script_location = alembic

# Database URL - using aiosqlite for async support
sqlalchemy.url = sqlite+aiosqlite:///./wakeonlan.db

# PyTZ timezone configuration
timezone = UTC

# Output encoding
output_encoding = utf-8

# SQL rendering options
sqlalchemy.echo = false
sqlalchemy.echo_pool = false
sqlalchemy.pool_pre_ping = true

# Migration generation options
autogenerate.version_table = alembic_version
autogenerate.version_table_schema = None
autogenerate.compare_type = true
autogenerate.compare_server_default = true
autogenerate.render_as_batch = true

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
